name = "spawn-bench-noop-child"
version = "0.1.0"
# Package path is relative to the CWD theater is run from, not the manifest's
# own directory. Bench docs assume `theater spawn ./supervisor/manifest.toml`
# is run from the spawn-bench/ directory; this path resolves from there.
package = "./noop-child/target/wasm32-unknown-unknown/release/spawn_bench_noop_child.wasm"

[[handler]]
type = "runtime"
