name: Publish to crates.io

on:
  push:
    branches: [main]
    paths:
      - "crates/*/Cargo.toml"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check-version:
    name: Check for version changes
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.detect.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect version changes in crates
        id: detect
        run: |
          CHANGED=false
          for toml in crates/*/Cargo.toml; do
            crate=$(basename $(dirname "$toml"))
            NEW=$(grep -m1 '^version = ' "$toml" | sed 's/version = "\(.*\)"/\1/')
            OLD=$(git show HEAD~1:"$toml" 2>/dev/null | grep -m1 '^version = ' | sed 's/version = "\(.*\)"/\1/' || echo "")
            if [ "$NEW" != "$OLD" ] && [ -n "$OLD" ]; then
              echo "  $crate: $OLD -> $NEW"
              CHANGED=true
            fi
          done
          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Publish changed crates
        run: nix develop --command cargo publish --workspace
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Create tag and GitHub release
        run: |
          DATE=$(date +%Y%m%d)
          TAG="release-$DATE"
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
