name: Publish to crates.io

on:
  push:
    branches: [main]
    paths:
      - "crates/*/Cargo.toml"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check-version:
    name: Check for version changes
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.detect.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect version changes in crates
        id: detect
        run: |
          CHANGED=false
          for toml in crates/*/Cargo.toml; do
            crate=$(basename $(dirname "$toml"))
            NEW=$(grep -m1 '^version = ' "$toml" | sed 's/version = "\(.*\)"/\1/')
            OLD=$(git show HEAD~1:"$toml" 2>/dev/null | grep -m1 '^version = ' | sed 's/version = "\(.*\)"/\1/' || echo "")
            if [ "$NEW" != "$OLD" ] && [ -n "$OLD" ]; then
              echo "  $crate: $OLD -> $NEW"
              CHANGED=true
            fi
          done
          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: check-version
    if: needs.check-version.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/magic-nix-cache-action@main

      # Try publishing each crate. Skip those already published. `cargo
      # publish --workspace` would just abort on the first already-published
      # crate, so we iterate.
      #
      # Iterating crates/*/Cargo.toml alphabetically breaks when a crate's
      # dep on a sibling sorts later (e.g. theater-cli depends on
      # theater-handler-podman). Retry deferred "package not found" failures
      # in successive passes until either the queue drains or a pass makes
      # no progress.
      #
      # Note: capture exit code separately from output — piping through `tee`
      # would always exit 0, masking real failures.
      - name: Publish crates
        run: |
          nix develop --command bash -c '
            set -e
            pending=()
            for toml in crates/*/Cargo.toml; do
              pending+=("$(basename $(dirname "$toml"))")
            done

            pass=0
            while [ ${#pending[@]} -gt 0 ]; do
              pass=$((pass + 1))
              echo "::group::Pass $pass (${#pending[@]} crate(s) to try)"
              deferred=()
              progress=0
              for crate in "${pending[@]}"; do
                echo "--- $crate"
                set +e
                output=$(cargo publish -p "$crate" 2>&1)
                code=$?
                set -e
                echo "$output"
                if [ $code -eq 0 ]; then
                  echo "Published $crate"
                  progress=1
                elif echo "$output" | grep -q "already exists on crates.io"; then
                  echo "Skipped $crate (already published)"
                  progress=1
                elif echo "$output" | grep -q "package.publish.*must be set"; then
                  echo "Skipped $crate (publish = false)"
                  progress=1
                elif echo "$output" | grep -q "no matching package named"; then
                  echo "Deferring $crate (missing dep, will retry)"
                  deferred+=("$crate")
                else
                  echo "Publish failed for $crate (exit $code)"
                  echo "::endgroup::"
                  exit 1
                fi
              done
              echo "::endgroup::"
              if [ $progress -eq 0 ]; then
                echo "No progress in pass $pass — remaining crates have unsatisfiable deps: ${deferred[*]}"
                exit 1
              fi
              pending=("${deferred[@]}")
            done
          '
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Create tag and GitHub release
        run: |
          DATE=$(date +%Y%m%d)
          TAG="release-$DATE"
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
