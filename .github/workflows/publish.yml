name: Publish to crates.io

on:
  push:
    branches: [main]
    paths:
      - "Cargo.toml"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check-version:
    name: Check version change
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.detect.outputs.version }}
      changed: ${{ steps.detect.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect version change
        id: detect
        run: |
          NEW=$(grep -m1 '^version = ' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          OLD=$(git show HEAD~1:Cargo.toml 2>/dev/null | grep -m1 '^version = ' | sed 's/version = "\(.*\)"/\1/' || echo "")
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          if [ "$NEW" != "$OLD" ] && [ -n "$OLD" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Version changed: $OLD -> $NEW"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No version change (current: $NEW)"
          fi

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Publish all crates
        run: |
          CRATES=(
            theater-chain
            theater
            theater-handler-assembler
            theater-handler-loop
            theater-handler-message-server
            theater-handler-rpc
            theater-handler-runtime
            theater-handler-store
            theater-handler-supervisor
            theater-handler-tcp
            theater-handler-terminal
            theater-handler-timer
            theater-server
            theater-cli
            theater-client
            theater-server-cli
          )
          for crate in "${CRATES[@]}"; do
            echo "=== Publishing $crate ==="
            nix develop --command cargo publish -p "$crate" --no-verify
            echo ""
          done
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Create tag and GitHub release
        run: |
          VERSION="v${{ needs.check-version.outputs.version }}"
          git tag "$VERSION"
          git push origin "$VERSION"
          gh release create "$VERSION" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
