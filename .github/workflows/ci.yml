name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Cargo.lock is up to date
        # --locked fails if Cargo.lock is stale, so a dep added to a Cargo.toml
        # without regenerating the lock is caught here at PR time rather than
        # slipping through to the crane/publish builds (which use --locked).
        run: nix develop --command cargo metadata --format-version 1 --locked > /dev/null

      - name: Check
        run: nix develop --command cargo check --workspace

      - name: Clippy
        run: nix develop --command cargo clippy --workspace -- -D warnings

      - name: Format
        run: nix develop --command cargo fmt --all -- --check

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Unit tests
        run: nix develop --command cargo test -p theater --lib

      - name: Build test actors
        run: |
          nix develop --command bash -c '
            for dir in test-actors/*/; do
              if [ -f "$dir/Cargo.toml" ]; then
                name=$(basename "$dir")
                echo "Building $name..."
                (cd "$dir" && cargo build --target wasm32-unknown-unknown --release)
              fi
            done
          '

      - name: Integration tests
        run: nix develop --command cargo test -p theater --test contract_enforcement_test --test pact_contract_test --test golden_chain_test --test composite_integration_test --test self_contained_replay_test

      - name: Handler integration tests
        run: nix develop --command cargo test -p theater-tests

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build test actors
        run: |
          nix develop --command bash -c '
            for dir in test-actors/*/; do
              if [ -f "$dir/Cargo.toml" ]; then
                name=$(basename "$dir")
                echo "Building $name..."
                (cd "$dir" && cargo build --target wasm32-unknown-unknown --release)
              fi
            done
          '

      - name: Generate coverage (lib + integration + handler integration)
        run: |
          nix develop --command bash -c '
            cargo llvm-cov clean --workspace
            cargo llvm-cov --no-report -p theater --lib \
              --test contract_enforcement_test \
              --test pact_contract_test \
              --test golden_chain_test \
              --test composite_integration_test
            cargo llvm-cov --no-report -p theater-tests --tests
            cargo llvm-cov report --lcov --output-path lcov.info
            echo "=== Coverage summary ==="
            cargo llvm-cov report --summary-only
          '

      - name: Upload lcov artifact
        uses: actions/upload-artifact@v4
        with:
          name: lcov
          path: lcov.info

  publish-check:
    name: Publish Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Check for version change
        id: version
        run: |
          git fetch origin main
          NEW=$(grep -m1 '^version = ' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          OLD=$(git show origin/main:Cargo.toml 2>/dev/null | grep -m1 '^version = ' | sed 's/version = "\(.*\)"/\1/' || echo "")
          if [ "$NEW" != "$OLD" ] && [ -n "$OLD" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Version changed: $OLD -> $NEW"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No version change"
          fi

      - uses: DeterminateSystems/nix-installer-action@main
        if: steps.version.outputs.changed == 'true'

      - uses: DeterminateSystems/magic-nix-cache-action@main
        if: steps.version.outputs.changed == 'true'

      - name: Verify all crates package correctly
        if: steps.version.outputs.changed == 'true'
        run: |
          nix develop --command cargo package --workspace --allow-dirty

  # End-to-end reference for the packr 0.10.2 self-contained fleet rebuild:
  # drive a single-package actor (state-test) all the way through the real
  # tooling — `theater build --release` (compose + verify-in-build) -> the
  # emitted composite -> `theater spawn` on the runtime (assert_self_contained
  # + init runs). This is the exact path every fleet actor follows, validated
  # on one actor so the fan-out can copy it.
  reference-actor:
    name: Reference actor (self-contained e2e)
    runs-on: ubuntu-latest
    env:
      COMPOSITE: test-actors/state-test/target/wasm32-unknown-unknown/release/state_test_actor.composite.wasm
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build the theater CLI
        run: nix develop --command cargo build -p theater-cli --release

      - name: theater build --release (compose + verify-in-build)
        run: |
          set -euo pipefail
          nix develop --command ./target/release/theater build --release test-actors/state-test
          test -f "$COMPOSITE" || { echo "::error::composite not emitted at $COMPOSITE"; exit 1; }
          echo "composite emitted: $COMPOSITE ($(stat -c%s "$COMPOSITE") bytes)"
          echo "manifest now points at:"; grep '^package' test-actors/state-test/manifest.toml

      - name: Assert composite is self-contained (imports host-only)
        run: |
          nix develop --command bash -c '
            set -euo pipefail
            wasm-tools validate "$COMPOSITE"
            bad=$(wasm-tools print "$COMPOSITE" | grep -E "^[[:space:]]*\(import " | grep -v "theater:simple/" || true)
            if [ -n "$bad" ]; then echo "::error::non-host imports (not self-contained):"; echo "$bad"; exit 1; fi
            echo "all residual imports are host theater:simple/* — composite is self-contained"
          '

      # Crane/workspace path: compose the already-built member with the standalone
      # `theater compose` subcommand (what crane-built fleet actors use, since
      # `theater build` re-runs cargo and assumes a standalone crate).
      - name: theater compose (crane-style, on the prebuilt member)
        run: |
          nix develop --command bash -c '
            set -euo pipefail
            member=test-actors/state-test/target/wasm32-unknown-unknown/release/state_test_actor.wasm
            out=$(./target/release/theater compose "$member" -o /tmp/state_test.composite.wasm)
            test -f /tmp/state_test.composite.wasm || { echo "::error::theater compose produced no output"; exit 1; }
            wasm-tools validate /tmp/state_test.composite.wasm
            bad=$(wasm-tools print /tmp/state_test.composite.wasm | grep -E "^[[:space:]]*\(import " | grep -v "theater:simple/" || true)
            if [ -n "$bad" ]; then echo "::error::theater compose output is not self-contained:"; echo "$bad"; exit 1; fi
            echo "theater compose produced a verified self-contained composite: $out"
          '

      - name: Spawn on the 0.10.2 runtime (assert_self_contained + init runs)
        run: |
          nix develop --command bash -c '
            set -uo pipefail
            log=$(mktemp)
            ./target/release/theater spawn test-actors/state-test/manifest.toml > "$log" 2>&1 &
            pid=$!
            ok=0
            for _ in $(seq 1 80); do
              if grep -q "state-test: init called" "$log"; then ok=1; break; fi
              if grep -qiE "Failed to load WASM|not self-contained|assert_self_contained|Actor error|Failed to start actor|Failed to create runtime" "$log"; then ok=2; break; fi
              kill -0 "$pid" 2>/dev/null || { ok=3; break; }
              sleep 0.5
            done
            kill "$pid" 2>/dev/null || true
            wait "$pid" 2>/dev/null || true
            echo "=== theater spawn output ==="; cat "$log"
            case "$ok" in
              1) echo "reference actor LOADED (self-contained) + ran init on the runtime" ;;
              2) echo "::error::composite failed to load / init errored"; exit 1 ;;
              3) echo "::error::theater spawn exited before init"; exit 1 ;;
              *) echo "::error::timed out waiting for init"; exit 1 ;;
            esac
          '
