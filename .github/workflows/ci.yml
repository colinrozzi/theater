name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Check
        run: nix develop --command cargo check --workspace

      - name: Clippy
        run: nix develop --command cargo clippy --workspace -- -D warnings

      - name: Format
        run: nix develop --command cargo fmt --all -- --check

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Unit tests
        run: nix develop --command cargo test -p theater --lib

      - name: Build test actors
        run: |
          nix develop --command bash -c '
            for dir in test-actors/*/; do
              if [ -f "$dir/Cargo.toml" ]; then
                name=$(basename "$dir")
                echo "Building $name..."
                (cd "$dir" && cargo build --target wasm32-unknown-unknown --release)
              fi
            done
          '

      - name: Integration tests
        run: nix develop --command cargo test -p theater --test contract_enforcement_test --test pact_contract_test --test golden_chain_test --test composite_integration_test

      - name: Handler integration tests
        run: nix develop --command cargo test -p theater-tests

  publish-check:
    name: Publish Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Check for version change
        id: version
        run: |
          git fetch origin main
          NEW=$(grep -m1 '^version = ' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          OLD=$(git show origin/main:Cargo.toml 2>/dev/null | grep -m1 '^version = ' | sed 's/version = "\(.*\)"/\1/' || echo "")
          if [ "$NEW" != "$OLD" ] && [ -n "$OLD" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Version changed: $OLD -> $NEW"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No version change"
          fi

      - uses: DeterminateSystems/nix-installer-action@main
        if: steps.version.outputs.changed == 'true'

      - uses: DeterminateSystems/magic-nix-cache-action@main
        if: steps.version.outputs.changed == 'true'

      - name: Dry-run publish all crates
        if: steps.version.outputs.changed == 'true'
        run: |
          CRATES=(
            theater-chain
            theater
            theater-handler-assembler
            theater-handler-loop
            theater-handler-message-server
            theater-handler-rpc
            theater-handler-runtime
            theater-handler-store
            theater-handler-supervisor
            theater-handler-tcp
            theater-handler-terminal
            theater-handler-timer
            theater-server
            theater-cli
            theater-client
            theater-server-cli
          )
          for crate in "${CRATES[@]}"; do
            echo "=== $crate ==="
            nix develop --command cargo publish -p "$crate" --dry-run 2>&1
            echo ""
          done
