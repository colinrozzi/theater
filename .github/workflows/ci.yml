name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Check
        run: nix develop --command cargo check --workspace

      - name: Clippy
        run: nix develop --command cargo clippy --workspace -- -D warnings

      - name: Format
        run: nix develop --command cargo fmt --all -- --check

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Unit tests
        run: nix develop --command cargo test -p theater --lib

      - name: Build test actors
        run: |
          nix develop --command bash -c '
            for dir in test-actors/*/; do
              if [ -f "$dir/Cargo.toml" ]; then
                name=$(basename "$dir")
                echo "Building $name..."
                (cd "$dir" && cargo build --target wasm32-unknown-unknown --release)
              fi
            done
          '

      - name: Integration tests
        run: nix develop --command cargo test -p theater --test contract_enforcement_test --test pact_contract_test --test golden_chain_test --test composite_integration_test

      - name: Handler integration tests
        run: nix develop --command cargo test -p theater-tests
