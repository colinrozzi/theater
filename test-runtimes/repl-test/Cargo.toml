[package]
name = "repl-test"
version = "0.1.0"
edition = "2021"

[workspace]

[dependencies]
# Theater runtime
theater = { path = "../../crates/theater" }

# Pack for Value types and runtime
packr = "0.4.0"

# Async runtime
tokio = { version = "1.0", features = ["full"] }

# Error handling
anyhow = "1.0"

# For test output
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
